<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <h1>Color Palette Generator</h1>
      <button id="generator-btn">
        <i class="fas fa-sync-alt"></i>
        Generate Palette
      </button>
      <div class="palette-container">
        <!-- Color-box:1 -->
        <div class="color-box">
          <div class="color" style="background-color: #e1f5fe"></div>
          <div class="color-info">
            <span class="hex">#EF5FE</span>
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
          </div>
        </div>
        <!-- Color-box:2 -->
        <div class="color-box">
          <div class="color" style="background-color: #b3e5fc"></div>
          <div class="color-info">
            <span class="hex">#b3e5fc</span>
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
          </div>
        </div>
        <!-- Color-box:3 -->
        <div class="color-box">
          <div class="color" style="background-color: #81d4fa"></div>
          <div class="color-info">
            <span class="hex">#81d4fa</span>
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
          </div>
        </div>
        <!-- Color-box:4 -->
        <div class="color-box">
          <div class="color" style="background-color: #4fc3f7"></div>
          <div class="color-info">
            <span class="hex">#4fc3f7</span>
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
          </div>
        </div>
        <!-- Color-box:5 -->
        <div class="color-box">
          <div class="color" style="background-color: #29b6f6"></div>
          <div class="color-info">
            <span class="hex">#29b6f6</span>
            <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
